spring.application.name=todo-app
# Server Configuration
server.port=8080

# DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/tododb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=todouser
spring.datasource.password=todo1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator 엔드포인트
management.endpoints.web.exposure.include=health,info,metrics,loggers,threaddump,prometheus
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.info.env.enabled=true
info.app.name=My Spring Boot Application
info.app.version=1.0.0
info.team=Backend Development Team