<!DOCTYPE html>
<!-- 1. 타임리프 네임스페이스를 추가합니다. -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        .form-group { margin-bottom: 15px; }
        .error-msg { color: red; font-size: 14px; }
    </style>
</head>
<body>

<h2>회원가입</h2>

<div th:if="${param.error}" class="error-msg">
    회원가입에 실패했습니다. 다시 시도해주세요.
</div>
<br>

<form th:action="@{/user/joinProc}" th:object="${dto}" method="post" >

    <div class="form-group">
        <label for="email">이메일</label><br>
        <input type="email" id="email" th:field="*{email}" placeholder="이메일을 입력하세요" required>
    </div>

    <div class="form-group">
        <label for="password">비밀번호</label><br>
        <input type="password" id="password" th:field="*{password}" placeholder="비밀번호를 입력하세요" required>
    </div>

    <div class="form-group">
        <label for="name">이름</label><br>
        <input type="text" id="name" th:field="*{name}" placeholder="이름을 입력하세요" required>
    </div>

    <button type="submit">가입하기</button>
</form>

</body>
</html>
