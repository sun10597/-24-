<!doctype html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
</head>
<body>
<div th:if="${msg}" style="color: red; margin-bottom: 10px;">
    <p th:text="${msg}"></p>
</div>

<form action="/loginProc" method="post">
    <input type="text" id="id" name="id" placeholder="아이디를 입력해주세요" required>
    <input type="text" id="password" name="password" placeholder="비밀번호를 입력해주세요" required>
    <input type="submit" value="로그인">
</form>

</body>
</html>
