<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>쿠키 입력 폼</title>
</head>
<body>
<h2>쿠키 입력</h2>
<form action="/addCookie" method="get">
    <label for="cookieName">쿠키이름</label>
    <input th:id="cookieName" type="text" name="cookieName"><br>

    <label for="cookieValue">쿠키값</label>
    <input th:id="cookieValue" type="text" name="cookieValue"><br>
    <input type="submit" value="쿠키저장"/>
</form>
</body>
</html>
