<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 등록</title>
    <link rel="stylesheet" th:href="@{/friend.css}">

</head>
<body>
<h1>새 글 등록하기</h1>

<form th:action="@{/articles/addProc}" method="post">
    <div>
        <label for="title">제목 : </label>
        <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required>
    </div>
    <br>
    <div>
        <label for="writer">작성자 : </label>
        <input type="text" id="writer" name="writer" placeholder="작성자 이름을 입력하세요" required>
    </div>
    <br>
    <div>
        <label for="content">내용 : </label>
        <textarea id="content" name="content" rows="5" placeholder="내용을 입력하세요" required></textarea>
    </div>
    <br>
    <button type="submit">등록하기</button>
    <a th:href="@{/articles}">취소</a>
</form>
</body>
</html>
