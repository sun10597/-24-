<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>친구 목록</title>
    <link rel="stylesheet" th:href="@{/friend.css}">
</head>
<body>
<h1>친구 목록</h1>

<a th:href="@{/friends/add}">친구 등록</a>
<br><br>

<table>
    <thead>
    <tr>
        <th>번호</th>
        <th>이름</th>
        <th>이메일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="friend : ${friends}">
        <td>
            <a th:href="@{/friends/{id}(id=${friend.id})}" th:text="${friend.name}"></a>
        </td>
        <td th:text="${friend.name}"></td>
        <td th:text="${friend.email}"></td>
    </tr>
    </tbody>
</table>
<div th:if="${friends.totalPages > 1}">
    <ul>
        <li th:each="i:${#numbers.sequence(1,friends.totalPages)}">
            <a th:href="@{/friends(page=${i - 1})}"
               th:text="${i}"
               th:classappend="${friends.number == i - 1}?'active' : ''">
            </a>
        </li>
    </ul>
</div>
</body>
</html>
