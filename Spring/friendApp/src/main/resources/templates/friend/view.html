<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>친구 정보 보기</title>
</head>
<body>
<h1>친구 상세 정보</h1>

<table>
    <tr>
        <th>번호</th>
        <td th:text="${friend.id}"><td>
    </tr>
    <tr>
        <th>이름</th>
        <td th:text="${friend.name}"></td>
    </tr>
    <tr>
        <th>이메일</th>
        <td th:text="${friend.email}"></td>
    </tr>
</table>

<br>
<div>
    <a th:href="@{/friends/{id}/edit(id=${friend.id})}">정보 수정</a> |

    <form th:action="@{/friends/{id}/delete(id=${friend.id})}" method="post" style="display:inline;">
        <button type="submit" onclick="return confirm('정말 삭제하시겠습니까?');">친구 삭제</button>
    </form> |

    <a th:href="@{/friends}">목록으로</a>
</div>

</body>
</html>
