<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 메인 페이지</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 네비게이션 바 (헤더) -->
    <div id="header-container"></div>

    <div class="main-content">
        <!-- 카드 리스트 영역[cite: 1] -->
        <section class="card-section">
            <div class="card">
                <div class="card-image">Image Placeholder</div>
                <div class="card-body">
                    <h2 class="card-title">첫 번째 프로젝트</h2>
                    <p class="card-text">카드 컴포넌트 디자인을 활용한 메인 페이지 구성입니다.</p>
                    <a href="#" class="card-button">상세보기</a>
                </div>
            </div>
            <div class="card">
                <div class="card-image">Image Placeholder</div>
                <div class="card-body">
                    <h2 class="card-title">두 번째 프로젝트</h2>
                    <p class="card-text">다양한 아이템을 카드 형식으로 깔끔하게 배치했습니다.</p>
                    <a href="#" class="card-button">상세보기</a>
                </div>
            </div>
        </section>
    </div>
    <!-- 헤더를 불러오는 스크립트 -->
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            })
            .catch(error => console.error('헤더를 불러오는 중 오류 발생:', error));
    </script>
</body>
</html>
