<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Overflow 속성 비교 테스트</title>
    <style>
        .wrapper {
            display: flex;
            gap: 50px;
            padding: 50px;
            flex-wrap: wrap;
        }

        .parent {
            width: 200px;
            height: 150px;
            border: 3px solid black;
            background-color: #f0f0f0;
        }

        .child {
            width: 250px;
            height: 200px;
            background-color: rgba(255, 165, 0, 0.7);
            padding: 10px;
            color: white;
            font-weight: bold;
        }


        .v-visible { overflow: visible; }


        .v-hidden { overflow: hidden; }


        .v-auto { overflow: auto; }

        .label {
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Overflow 속성 비교</h1>

    <div class="wrapper">

        <div>
            <div class="label">1. visible (기본값)</div>
            <div class="parent v-visible">
                <div class="child">저는 부모를 탈출해서 다 보입니다!</div>
            </div>
        </div>


        <div>
            <div class="label">2. hidden</div>
            <div class="parent v-hidden">
                <div class="child">저는 부모 밖으로 나간 부분은 잘려서 안 보여요.</div>
            </div>
        </div>


        <div>
            <div class="label">3. auto</div>
            <div class="parent v-auto">
                <div class="child">저는 부모가 작으면 스크롤바를 만들어서 저를 다 보여줍니다.</div>
            </div>
        </div>
    </div>

</body>
</html>
