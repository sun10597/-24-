<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="number">0</h2>
    <div>
        <button id="plus">+1</button>
        <button id="minus">-1</button>
    </div>

    <script>
        const number = document.getElementById("number");
        let count = 0;

        document.getElementById('plus').addEventListener('click', () => number.innerText = ++count);
        document.getElementById('minus').addEventListener('click', () => number.innerText = --count);
    </script>
</body>
</html>
